services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  customer-app:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
      args:
        APP_NAME: customer-app
        NEXT_PUBLIC_API_URL: /api
        API_INTERNAL_URL: http://backend:4000
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
        NEXT_PUBLIC_CUSTOMER_APP_PORT: ${NEXT_PUBLIC_CUSTOMER_APP_PORT:-3001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "3001:3001"
    restart: unless-stopped

  pos-app:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
      args:
        APP_NAME: pos-app
        NEXT_PUBLIC_API_URL: /api
        API_INTERNAL_URL: http://backend:4000
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
        NEXT_PUBLIC_CUSTOMER_APP_PORT: ${NEXT_PUBLIC_CUSTOMER_APP_PORT:-3001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "3002:3002"
    restart: unless-stopped

  kitchen-app:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
      args:
        APP_NAME: kitchen-app
        NEXT_PUBLIC_API_URL: /api
        API_INTERNAL_URL: http://backend:4000
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
        NEXT_PUBLIC_CUSTOMER_APP_PORT: ${NEXT_PUBLIC_CUSTOMER_APP_PORT:-3001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "3003:3003"
    restart: unless-stopped

  admin-dashboard:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
      args:
        APP_NAME: admin-dashboard
        NEXT_PUBLIC_API_URL: /api
        API_INTERNAL_URL: http://backend:4000
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
        NEXT_PUBLIC_CUSTOMER_APP_PORT: ${NEXT_PUBLIC_CUSTOMER_APP_PORT:-3001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3004"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "3004:3004"
    restart: unless-stopped

  waiter-app:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
      args:
        APP_NAME: waiter-app
        NEXT_PUBLIC_API_URL: /api
        API_INTERNAL_URL: http://backend:4000
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
        NEXT_PUBLIC_CUSTOMER_APP_PORT: ${NEXT_PUBLIC_CUSTOMER_APP_PORT:-3001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "3005:3005"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend/Dockerfile
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:123456@host.docker.internal:5432/restaurant_db}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-1234}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-change-me-refresh-1234}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CUSTOMER_APP_URL: ${CUSTOMER_APP_URL:-http://localhost:3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:3005,http://localhost,http://127.0.0.1:3001,http://127.0.0.1:3002,http://127.0.0.1:3003,http://127.0.0.1:3004,http://127.0.0.1:3005,http://127.0.0.1,http://customer.localhost,http://pos.localhost,http://kitchen.localhost,http://admin.localhost,http://waiter.localhost}
      HOST_IP: ${HOST_IP:-}
      HOST_HOSTNAME: ${HOST_HOSTNAME:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/auth/status"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 90s
    ports:
      - "4000:4000"
    volumes:
      - ./shared:/app/shared:ro
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      admin-dashboard:
        condition: service_healthy
      backend:
        condition: service_healthy
      customer-app:
        condition: service_healthy
      kitchen-app:
        condition: service_healthy
      pos-app:
        condition: service_healthy
      waiter-app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
